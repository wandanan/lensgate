version: "3.9"

services:
  tlma:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tlma-gateway
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - ./backend/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8080
    volumes:
      - ./valuation:/app/valuation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
