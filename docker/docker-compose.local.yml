name: lensgate

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: lensgate-backend:local
    container_name: lensgate-backend
    ports:
      - "${BACKEND_PORT:-9856}:9856"
    env_file:
      - ../.env
    environment:
      - HOST=0.0.0.0
      - PORT=9856
    volumes:
      - ../logs:/app/logs
      - ../valuation:/app/valuation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9856/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    image: lensgate-dashboard:local
    container_name: lensgate-dashboard
    ports:
      - "${DASHBOARD_PORT:-8856}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
