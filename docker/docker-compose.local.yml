name: tlma-gateway

services:
  tlma:
    image: tlma-gateway:local
    container_name: tlma-gateway
    ports:
      - "${PORT:-9856}:9856"
    env_file:
      - ../.env
    environment:
      - HOST=0.0.0.0
      - PORT=9856
    volumes:
      - ../valuation:/app/valuation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9856/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
